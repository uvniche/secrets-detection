# DevSecOps pipeline: secrets, dependency audit, Python SAST, tests, filesystem scan
name: Security CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secrets scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Full-repo scan (not gitleaks/gitleaks-action push-range mode). The action
      # runs `git log before^..after`; when `before` is the root commit, `before^`
      # does not exist and the job fails with "unknown revision".
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --verbose --exit-code 2

  python-security:
    name: Python tests, Bandit, pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Unit tests
        run: pytest -q

      - name: Bandit (Python SAST)
        run: bandit -r src -c pyproject.toml

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt --desc

  trivy:
    name: Filesystem scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

