# DevSecOps pipeline: secrets, dependency audit, Python SAST, tests, container scan
name: Security CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secrets scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-security:
    name: Python tests, Bandit, pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Unit tests
        run: pytest -q

      - name: Bandit (Python SAST)
        run: bandit -r src -c pyproject.toml

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt --desc

  trivy:
    name: Filesystem & container scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, do not push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: secure-api-demo:ci

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: secure-api-demo:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
