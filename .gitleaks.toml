[extend]
useDefault = true

[[allowlists]]
description = "Allow intentional fake AWS secret demo pattern in docs/history"
regexes = [
  '''AWS_SECRET_ACCESS_KEY(?:_EXAMPLE)?=[A-Za-z0-9/+_=.-]{20,}''',
  '''printf "AWS_SECRET_ACCESS_KEY(?:_EXAMPLE)?=[A-Za-z0-9/+_=.-]{20,}\\n" > demo-secret\.txt''',
]
paths = [
  '''^README\.md$''',
  '''^demo-secret\.txt$''',
]
